<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felixx tournament</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="bracket.css">
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="new-chat-btn" id="start-new-btn">
                <span class="plus-icon">+</span> New Tournament
            </div>

            <div class="recent-chats">
                <div class="section-title">SETTINGS</div>
                
                <div class="settings-group">
                    <label>Tournament Format</label>
                    <select id="format-select" class="input-box" style="width: 100%; color: var(--text); background: var(--surface2); border: 1px solid var(--border);">
                        <option value="single">Single Elimination</option>
                        <option value="double">Double Elimination</option>
                    </select>
                </div>

                <div class="section-title" style="margin-top: 20px;">PLAYERS</div>
                <div class="input-box" style="margin-bottom: 8px;">
                    <input type="text" id="player-input" placeholder="Add Player Name..." style="background: transparent; border: none; color: white; width: 100%; outline: none;">
                    <label for="player-image-input" class="icon-btn" style="color: var(--orange); cursor: pointer; font-size: 16px;">🖼️</label>
                    <input type="file" id="player-image-input" accept="image/*" style="display: none;">
                    <button id="add-player-btn" class="icon-btn" style="color: var(--orange);">+</button>
                </div>
                <div id="image-preview-container" style="display: none; padding: 10px; border: 1px dashed var(--orange-dim); border-radius: 8px; margin-bottom: 10px; align-items: center; gap: 10px;">
                    <img id="image-preview-img" src="" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--orange);">
                    <span id="image-filename" style="font-size: 12px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;"></span>
                    <button id="remove-image-btn" style="background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px;">×</button>
                </div>
                <div id="players-list" style="max-height: 150px; overflow-y: auto; margin-bottom: 20px;">
                    <!-- Player items go here -->
                </div>

                <div class="section-title">SCORING CRITERIA</div>
                <div class="input-box" style="margin-bottom: 8px;">
                    <input type="text" id="criteria-input" placeholder="Add Criterion (e.g. Kills)..." style="background: transparent; border: none; color: white; width: 100%; outline: none;">
                    <button id="add-criteria-btn" class="icon-btn" style="color: var(--orange);">+</button>
                </div>
                <div id="criteria-list" style="max-height: 150px; overflow-y: auto;">
                    <!-- Criteria items go here -->
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="generate-bracket-btn" class="save-btn" style="width: 100%; text-align: center; margin-bottom: 10px;">Start Tournament</button>
                <div class="section-title">DATA</div>
                <button id="export-btn" class="nav-link" style="width: 100%; text-align: left; background: none; border: none; cursor: pointer;">Export Save Code</button>
                <button id="import-btn" class="nav-link" style="width: 100%; text-align: left; background: none; border: none; cursor: pointer;">Import Save Code</button>
                <button id="reset-btn" class="nav-link" style="width: 100%; text-align: left; color: var(--danger); background: none; border: none; cursor: pointer;">Reset All</button>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="top-nav">
                <div class="nav-left">
                    <div class="brand-text">FELIXX TOURNAMENT</div>
                </div>
            </div>

            <div class="chat-container" style="max-width: 100%; overflow: hidden; display: flex; flex-direction: column;">
                <!-- WELCOME / EMPTY STATE -->
                <div id="welcome-screen" class="welcome-screen" style="display: flex;">
                    <div class="greeting">Tournament Ready</div>
                    <div class="sub-greeting">Add players and settings to begin.</div>
                </div>

                <!-- BRACKET VIEW -->
                <div id="bracket-view" class="bracket-container" style="display: none; position: relative;">
                    <!-- SVG Overlay for lines -->
                    <svg id="bracket-svg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;"></svg>
                    <!-- Bracket rounds injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- SCORING MODAL -->
    <div id="score-modal" class="modal" style="display: none;">
        <div class="modal-content settings-card" style="width: 550px; max-width: 95%;">
            <h2 id="modal-match-title">Match Scoring</h2>
            
            <div id="modal-criteria-inputs" class="scorecard-container" style="max-height: 300px; overflow-y: auto; padding-right: 5px;">
                <!-- Inputs generated dynamically -->
            </div>

            <div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px;">
                <label style="color: var(--orange2); font-size: 14px; margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 1px;">Match Notes</label>
                <textarea id="match-notes-input" placeholder="Add highlights, key moments, or details about the match..." style="width: 100%; height: 80px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s;"></textarea>
            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button id="close-modal-btn" class="nav-link" style="border: 1px solid var(--border);">Cancel</button>
                <button id="save-score-btn" class="save-btn">Save & Advance</button>
            </div>
        </div>
    </div>

    <!-- IMPORT MODAL -->
    <div id="import-modal" class="modal" style="display: none;">
        <div class="modal-content settings-card" style="width: 500px;">
            <h2>Import Tournament</h2>
            <textarea id="import-area" style="width: 100%; height: 150px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 10px;" placeholder="Paste save code here..."></textarea>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button id="close-import-btn" class="nav-link">Cancel</button>
                <button id="confirm-import-btn" class="save-btn">Load</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
